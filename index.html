<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js/examples/image-tracking/assets/card-example/card.mind;"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="https://drive.google.com/uc?export=download&id=1WtsSnBVLYoF7l_l1sPRfumSUaGAUmPMK" autoplay loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="0.6"></a-video>
      </a-entity>
    </a-scene>
  </body>
</html>
